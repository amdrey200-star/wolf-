name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
      - run: cd wolf-armor-slot && gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: wolf-armor-slot
          path: wolf-armor-slot/build/libs/*.jar
